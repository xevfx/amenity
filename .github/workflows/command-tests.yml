name: Command Tests

on:
  push:
    branches:
      - codex
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  command-workflow:
    if: >-
      (github.event_name == 'pull_request' &&
        (github.head_ref == 'codex' || startsWith(github.head_ref, 'codex/'))) ||
      (github.event_name != 'pull_request' &&
        (github.ref_name == 'codex' || startsWith(github.ref_name, 'codex/')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y figlet

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Compile
        run: python -m compileall -q .

      - name: Command workflow tests
        run: python -m pytest -q tests/test_command_workflow.py

      - name: Upload command metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: command-workflow-report
          path: artifacts/command-workflow-report.json
          if-no-files-found: ignore
